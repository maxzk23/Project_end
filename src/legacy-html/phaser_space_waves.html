<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Waves (Easy & Fun Edition)</title>
    <!-- โหลด Phaser 3 ผ่าน CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Prompt:wght@400;600;700&display=swap');

        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: #0f172a;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh;
            font-family: 'Prompt', 'Segoe UI', sans-serif;
            user-select: none;
            overflow: hidden;
        }
        #game-container {
            box-shadow: 0 0 50px rgba(245, 158, 11, 0.3), inset 0 0 20px rgba(0,0,0,0.8);
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid #f59e0b;
        }
        .header {
            color: white;
            text-align: center;
            margin-bottom: 12px;
        }
        .header h1 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(245, 158, 11, 0.4);
            letter-spacing: 1px;
        }
        .header p { margin: 4px 0 0 0; color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex;align-items:center;justify-content:center;gap:15px;">
            <h1>⚡ สเปซเวฟส์ (Space Waves)</h1>
            <button onclick="this.blur(); if(!document.fullscreenElement){document.documentElement.requestFullscreen()}else{document.exitFullscreen()}" style="background:linear-gradient(135deg,#0284c7,#3b82f6);border:none;color:white;padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:bold;font-family:'Prompt',sans-serif;">📺 เต็มจอ</button>
        </div>
        <p>กดปุ่ม <b style="color:#fbbf24">Spacebar / คลิกค้าง</b> เพื่อเฉียงขึ้น-ลง ปรับช่องทางกว้างเล่นง่ายขึ้น พายานพิชิตเป้าหมาย <b style="color:#10b981">1,000m</b>!</p>
    </div>

    <div id="game-container"></div>

    <script>
        const FINISH_METERS = 1000;
        const LEVEL_WIDTH = FINISH_METERS * 10 + 500; // 10,500px

        const INITIAL_SPEED = 160; // เริ่มต้นช้า สบายๆ
        const MAX_SPEED = 350;     // ปรับความเร็วสูงสุดให้พอดีๆ ไม่เร็วเกินไป

        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            backgroundColor: '#090d16',
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 0 }, debug: false }
            },
            scene: { preload, create, update }
        };

        const game = new Phaser.Game(config);

        let player;
        let trailGraphics;
        let pathHistory = [];
        let walls, saws, lasers, finishLine;
        
        let isHolding = false;
        let isGameOver = false;
        let isWin = false;
        let distance = 0;
        let currentSpeedX = INITIAL_SPEED;

        let distText, speedIndicatorText;
        let bgStars, bgGrid;

        function preload() {
            // 1. ยานสามเหลี่ยมไซเบอร์
            let pGfx = this.add.graphics();
            pGfx.fillStyle(0xffffff, 1);
            pGfx.beginPath();
            pGfx.moveTo(26, 0);
            pGfx.lineTo(-12, -12);
            pGfx.lineTo(-4, 0);
            pGfx.lineTo(-12, 12);
            pGfx.closePath();
            pGfx.fillPath();
            pGfx.lineStyle(2, 0x38bdf8, 1);
            pGfx.strokePath();
            pGfx.generateTexture('ship', 40, 28);
            pGfx.destroy();

            // 2. ฟันเฟืองขนาดกะทัดรัดขึ้น (หลบง่ายขึ้น)
            let sawGfx = this.add.graphics();
            sawGfx.fillStyle(0x0f172a, 1);
            sawGfx.fillCircle(24, 24, 20);
            sawGfx.lineStyle(3, 0xef4444, 1);
            sawGfx.strokeCircle(24, 24, 20);
            sawGfx.fillStyle(0xf59e0b, 1);
            sawGfx.fillCircle(24, 24, 8);
            for(let i=0; i<6; i++) {
                let angle = (i * Math.PI / 3);
                let x = 24 + Math.cos(angle) * 22;
                let y = 24 + Math.sin(angle) * 22;
                sawGfx.fillStyle(0xef4444, 1);
                sawGfx.fillCircle(x, y, 5);
            }
            sawGfx.generateTexture('saw', 48, 48);
            sawGfx.destroy();

            // 3. ประตูเลเซอร์
            let lGfx = this.add.graphics();
            lGfx.fillStyle(0xef4444, 0.7);
            lGfx.fillRect(0, 0, 14, 100);
            lGfx.lineStyle(2, 0xffffff, 1);
            lGfx.strokeRect(0, 0, 14, 100);
            lGfx.generateTexture('laser_barrier', 14, 100);
            lGfx.destroy();

            // 4. ละอองพาร์ทิเคิลระเบิด
            let partGfx = this.add.graphics();
            partGfx.fillStyle(0xfbbf24, 1);
            partGfx.fillCircle(4, 4, 4);
            partGfx.generateTexture('spark', 8, 8);
            partGfx.destroy();
        }

        function create() {
            this.physics.world.setBounds(0, 0, LEVEL_WIDTH, 600);

            // --- พื้นหลัง 3 มิติParallax ---
            bgStars = this.add.graphics();
            bgStars.fillStyle(0xffffff, 0.3);
            for (let i = 0; i < 300; i++) {
                let rx = Phaser.Math.Between(0, LEVEL_WIDTH);
                let ry = Phaser.Math.Between(0, 600);
                bgStars.fillCircle(rx, ry, Phaser.Math.Between(1, 3));
            }
            bgStars.setScrollFactor(0.2);

            bgGrid = this.add.graphics();
            bgGrid.lineStyle(1, 0x78350f, 0.2);
            for (let x = 0; x < LEVEL_WIDTH; x += 100) {
                bgGrid.lineBetween(x, 0, x, 600);
            }
            bgGrid.setScrollFactor(0.6);

            trailGraphics = this.add.graphics();

            walls = this.physics.add.staticGroup();
            saws = this.physics.add.group();
            lasers = this.physics.add.staticGroup();

            buildLevel.call(this);

            // --- เส้นชัย 1,000 เมตร ---
            let finishX = FINISH_METERS * 10;
            let fGfx = this.add.graphics();
            fGfx.fillStyle(0x10b981, 0.3);
            fGfx.fillRect(finishX, 0, 30, 600);
            fGfx.lineStyle(4, 0x10b981, 1);
            fGfx.lineBetween(finishX, 0, finishX, 600);
            
            this.add.text(finishX, 300, '🏁 GOAL 1000m 🏁', {
                fontSize: '36px', fill: '#10b981', fontFamily: 'Orbitron', fontStyle: 'bold'
            }).setOrigin(0.5).setAngle(-90);

            finishLine = this.add.rectangle(finishX, 300, 30, 600, 0x10b981, 0);
            this.physics.add.existing(finishLine, true);

            // ตัวละครยาน (ปรับขนาดกล่องชนให้เล็กลง หลบง่ายขึ้น)
            player = this.physics.add.sprite(100, 300, 'ship');
            player.setCollideWorldBounds(true);
            player.body.setSize(18, 16);

            this.cameras.main.setBounds(0, 0, LEVEL_WIDTH, 600);
            this.cameras.main.startFollow(player, true, 0.1, 0.1, -220, 0);

            // ชนกัน
            this.physics.add.overlap(player, walls, crash, null, this);
            this.physics.add.overlap(player, saws, crash, null, this);
            this.physics.add.overlap(player, lasers, crash, null, this);
            this.physics.add.overlap(player, finishLine, reachGoal, null, this);

            // UI ระยะทางและสปีด
            distText = this.add.text(760, 20, '0 / 1000m', { 
                fontSize: '28px', fill: '#fbbf24', fontFamily: 'Orbitron', fontStyle: 'bold' 
            }).setOrigin(1, 0).setScrollFactor(0);

            speedIndicatorText = this.add.text(20, 20, 'SPEED: EASY', { 
                fontSize: '18px', fill: '#38bdf8', fontFamily: 'Orbitron', fontStyle: 'bold' 
            }).setScrollFactor(0);

            // ระบบควบคุม
            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    if (document.activeElement && document.activeElement.tagName === 'BUTTON') {
                        document.activeElement.blur();
                    }
                    e.preventDefault();
                }
            });

            this.input.on('pointerdown', () => handleInputStart.call(this));
            this.input.on('pointerup', () => isHolding = false);

            this.input.keyboard.on('keydown-SPACE', (event) => { if(event) event.stopPropagation(); handleInputStart.call(this); });
            this.input.keyboard.on('keyup-SPACE', () => isHolding = false);
            this.input.keyboard.on('keydown-UP', (event) => { if(event) event.stopPropagation(); handleInputStart.call(this); });
            this.input.keyboard.on('keyup-UP', () => isHolding = false);
        }

        function handleInputStart() {
            if (isGameOver || isWin) {
                restartGame.call(this);
            } else {
                isHolding = true;
            }
        }

        function buildLevel() {
            // ขยายระยะห่างระหว่างจุดสร้างสิ่งกีดขวางให้กว้างขึ้น (300px แทน 220px)
            for (let x = 0; x < LEVEL_WIDTH - 600; x += 300) {
                // ปรับความสูงเพดานและพื้นให้แคบน้อยลง (ท่อกว้างขึ้น บินง่ายขึ้นมาก!)
                let topH = Phaser.Math.Between(40, 100);
                let wTop = this.add.rectangle(x + 150, topH/2, 300, topH, 0x451a03);
                wTop.setStrokeStyle(3, 0xf59e0b);
                this.physics.add.existing(wTop, true);
                walls.add(wTop);

                let botH = Phaser.Math.Between(40, 100);
                let wBot = this.add.rectangle(x + 150, 600 - botH/2, 300, botH, 0x451a03);
                wBot.setStrokeStyle(3, 0xf59e0b);
                this.physics.add.existing(wBot, true);
                walls.add(wBot);

                // สุ่มสร้างสิ่งกีดขวางในระยะที่ห่างกัน บินหลบสบายๆ
                if (x > 600) {
                    let rand = Phaser.Math.Between(1, 3);
                    if (rand === 1) {
                        // ฟันเฟืองขนาดกะทัดรัด เคลื่อนที่ช้าๆ
                        let sawY = Phaser.Math.Between(220, 380);
                        let saw = saws.create(x + 150, sawY, 'saw');
                        saw.body.setAllowGravity(false);
                        saw.body.setImmovable(true);
                        saw.body.setSize(36, 36);

                        this.tweens.add({
                            targets: saw,
                            y: sawY + Phaser.Math.Between(-60, 60),
                            duration: 2200, // ช้าลง 
                            yoyo: true,
                            repeat: -1,
                            ease: 'Sine.easeInOut'
                        });
                        this.tweens.add({ targets: saw, angle: 360, duration: 2500, repeat: -1 });
                    } else if (rand === 2) {
                        // ประตูเลเซอร์สั้นลง
                        let laserY = Phaser.Math.Between(220, 380);
                        let laser = lasers.create(x + 150, laserY, 'laser_barrier');
                        this.tweens.add({
                            targets: laser,
                            alpha: { from: 0.9, to: 0.1 },
                            duration: 1100, // กระพริบช้าลง
                            yoyo: true,
                            repeat: -1
                        });
                    }
                }
            }
        }

        function update() {
            if (isGameOver || isWin) return;

            if (currentSpeedX < MAX_SPEED) {
                currentSpeedX += 0.08; // เร่งความเร็วช้าๆ นุ่มนวล
            }

            if (currentSpeedX < 220) speedIndicatorText.setText('SPEED: 🟢 EASY (สบายๆ)');
            else if (currentSpeedX < 300) speedIndicatorText.setText('SPEED: 🟡 NORMAL (กำลังดี)');
            else speedIndicatorText.setText('SPEED: 🔴 MAX SPEED (สปีดสูงสุด)');

            player.setVelocityX(currentSpeedX);

            if (isHolding) {
                player.setVelocityY(-currentSpeedX);
                player.setAngle(-45);
            } else {
                player.setVelocityY(currentSpeedX);
                player.setAngle(45);
            }

            distance = Math.min(FINISH_METERS, Math.floor(player.x / 10));
            distText.setText(`${distance} / ${FINISH_METERS}m`);

            pathHistory.push({ x: player.x, y: player.y });
            if (pathHistory.length > 28) pathHistory.shift();

            trailGraphics.clear();
            if (pathHistory.length > 1) {
                trailGraphics.lineStyle(10, 0xf43f5e, 0.7);
                trailGraphics.beginPath();
                trailGraphics.moveTo(pathHistory[0].x, pathHistory[0].y);
                for (let i = 1; i < pathHistory.length; i++) trailGraphics.lineTo(pathHistory[i].x, pathHistory[i].y);
                trailGraphics.strokePath();

                trailGraphics.lineStyle(3, 0xffffff, 1);
                trailGraphics.beginPath();
                trailGraphics.moveTo(pathHistory[0].x, pathHistory[0].y);
                for (let i = 1; i < pathHistory.length; i++) trailGraphics.lineTo(pathHistory[i].x, pathHistory[i].y);
                trailGraphics.strokePath();
            }
        }

        function crash() {
            if (isGameOver || isWin) return;
            isGameOver = true;

            player.setVisible(false);
            player.body.setVelocity(0, 0);

            let em = this.add.particles(player.x, player.y, 'spark', {
                speed: { min: -300, max: 300 },
                scale: { start: 1.5, end: 0 },
                blendMode: 'ADD',
                lifespan: 600,
                emitting: false
            });
            em.explode(35);
            this.time.delayedCall(700, () => em.destroy());

            this.time.delayedCall(300, () => {
                this.add.rectangle(player.x, 300, 800, 600, 0x000000, 0.75).setScrollFactor(0);
                this.add.text(400, 220, '💥 CRASHED!', { fontSize: '56px', fill: '#ef4444', fontFamily: 'Orbitron', fontStyle: 'bold' }).setOrigin(0.5).setScrollFactor(0);
                this.add.text(400, 300, `ระยะทางที่ทำได้: ${distance}m`, { fontSize: '32px', fill: '#fbbf24', fontFamily: 'Prompt' }).setOrigin(0.5).setScrollFactor(0);
                
                let restartHint = this.add.text(400, 410, '[ กด Spacebar หรือ คลิก เพื่อเริ่มใหม่ ]', { 
                    fontSize: '26px', fill: '#38bdf8', fontFamily: 'Prompt', fontStyle: 'bold' 
                }).setOrigin(0.5).setScrollFactor(0);

                this.tweens.add({ targets: restartHint, alpha: 0.4, duration: 500, yoyo: true, repeat: -1 });
            });
        }

        function reachGoal() {
            if (isWin) return;
            isWin = true;
            player.body.setVelocity(0, 0);

            let em = this.add.particles(player.x, 300, 'spark', {
                speed: { min: -350, max: 350 },
                scale: { start: 2, end: 0 },
                blendMode: 'ADD',
                lifespan: 1000,
                emitting: false
            });
            em.explode(60);
            this.time.delayedCall(1200, () => em.destroy());

            this.add.rectangle(player.x, 300, 800, 600, 0x000000, 0.75).setScrollFactor(0);
            this.add.text(400, 200, '🏆 MISSION COMPLETE!', { fontSize: '50px', fill: '#10b981', fontFamily: 'Orbitron', fontStyle: 'bold' }).setOrigin(0.5).setScrollFactor(0);
            this.add.text(400, 290, 'พิชิตเป้าหมาย 1,000m สำเร็จแล้ว!', { fontSize: '32px', fill: '#ffffff', fontFamily: 'Prompt' }).setOrigin(0.5).setScrollFactor(0);
            
            let winHint = this.add.text(400, 410, '[ กด Spacebar หรือ คลิก เพื่อเล่นอีกครั้ง ]', { 
                fontSize: '26px', fill: '#fbbf24', fontFamily: 'Prompt', fontStyle: 'bold' 
            }).setOrigin(0.5).setScrollFactor(0);
            this.tweens.add({ targets: winHint, alpha: 0.4, duration: 500, yoyo: true, repeat: -1 });
        }

        function restartGame() {
            isGameOver = false;
            isWin = false;
            isHolding = false;
            pathHistory = [];
            currentSpeedX = INITIAL_SPEED;
            this.scene.restart();
        }
    </script>
</body>
</html>
